spring:
  datasource:
    url: jdbc:h2:mem:compliance;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
  data:
    redis:
      host: localhost
      port: 6370
  test:
    mockito:
      reset-mocks: false

predix:
  compliance:
    admin-token: test-admin-token
