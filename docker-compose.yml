services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: predix_compliance
      POSTGRES_USER: predix
      POSTGRES_PASSWORD: predix
    ports:
      - "5433:5432"
    volumes:
      - compliance_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predix -d predix_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  compliance-policy:
    build: .
    ports:
      - "8095:8095"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/predix_compliance
      DATABASE_USER: predix
      DATABASE_PASSWORD: predix
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ADMIN_TOKEN: predix-admin-dev-token
      SERVER_PORT: 8095
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  compliance_pg:
